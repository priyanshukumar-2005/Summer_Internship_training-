<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="main-heading">Mini Project Cards</h1>

    <div class="container">

        <div class="card">
            <h2>Nature</h2>
            <div class="img-frame"><img src="https://picsum.photos/300/200?random=1" alt="Nature"></div>
            <button type="submit">Submit</button>
        </div>

        <div class="card">
            <h2>Technology</h2>
            <div class="img-frame"><img src="https://picsum.photos/300/200?random=2" alt="Technology"></div>

        </div>

        <div class="card">
            <h2>Travel</h2>
            <div class="img-frame"><img src="https://picsum.photos/300/200?random=3" alt="Travel"></div>
            <button type="submit">Submit</button>
        </div>

    </div>

</body>
</html>
